name: tuantuan_stock
description: A cute US-stock price viewer.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^17.3.0
  google_fonts: ^8.1.0
  http: ^1.5.0
  intl: ^0.20.2
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  custom_lint: ^0.7.6
  flutter_lints: ^6.0.0
  riverpod_lint: ^2.6.5
  flutter_launcher_icons: ^0.14.4
  # The in-memory fake behind shared_preferences, for tests only.
  shared_preferences_platform_interface: ^2.4.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/tuantuan_stock_icon.png
  adaptive_icon_background: assets/icon/tuantuan_stock_icon_background.png
  adaptive_icon_foreground: assets/icon/tuantuan_stock_icon_foreground.png
  remove_alpha_ios: true

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/fonts/
